name: CI

on:
  push:
    branches: [ github-actions-test ]
  pull_request:
    branches: [ github-actions-test ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build:
        - stable
        - nightly
        - windows-msvc

        include:
        - build: stable
          os: ubuntu-latest
          toolchain: stable

        - build: nightly
          os: ubuntu-latest
          toolchain: nightly

        - build: windows-msvc
          os: windows-latest
          toolchain: stable

    steps:
    - uses: actions/checkout@v2

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ matrix.toolchain }}
        target: ${{ matrix.target }}
        profile: minimal
        override: true

    - name: Build
      run: cargo build ${{ matrix.options }} --verbose

    - name: Run tests
      run: cargo test ${{ matrix.options }} --verbose

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build:
        - windows-x86
        - windows-x86_64

        include:
        - build: windows-x86
          os: windows-latest
          toolchain: stable
          target: i686-pc-windows-msvc

        - build: windows-x86_64
          os: windows-latest
          toolchain: stable
          target: x86_64-pc-windows-msvc

    steps:
    - uses: actions/checkout@v2

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ matrix.toolchain }}
        target: ${{ matrix.target }}
        profile: minimal
        override: true

    - name: Build
      run: cargo build --release --target ${{ matrix.target }} --verbose

    - name: Run tests
      run: cargo test --release --target ${{ matrix.target }} --verbose

    - name: Compress
      run: |
        mkdir dist
        7z a -mx9 "dist/exe-${{ matrix.target }}.7z" "target/${{ matrix.target }}/release/vut.exe"

    - name: Upload artifacts
      uses: actions/upload-artifact@v1
      with:
        name: exe-${{ matrix.build }}
        path: dist/exe-${{ matrix.target }}.7z

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Create Release
      id: create_release
      uses: actions/create-release@latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: -- List of changes here --
        draft: true
        prerelease: false

    - uses: actions/download-artifact@v1
      with:
        name: exe-windows-x86
        path: release-artifacts

    - uses: actions/download-artifact@v1
      with:
        name: exe-windows-x86_64
        path: release-artifacts

    - run: ls -al release-artifacts

    - name: Upload exe-windows-x86
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: release-artifacts/exe-windows-x86.7z
        asset_name: exe-windows-x86.7z
        asset_content_type: application/x-7z-compressed

    - name: Upload exe-windows-x86_64
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: release-artifacts/exe-windows-x86_64.7z
        asset_name: exe-windows-x86_64.7z
        asset_content_type: application/x-7z-compressed
