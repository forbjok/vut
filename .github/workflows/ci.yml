name: CI

on:
  push:
    branches: [ nothing ]
  pull_request:
    branches: [ nothing ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build:
        - stable
        - nightly
        - windows-msvc

        include:
        - build: stable
          os: ubuntu-latest
          toolchain: stable

        - build: nightly
          os: ubuntu-latest
          toolchain: nightly

        - build: windows-msvc
          os: windows-latest
          toolchain: stable

    steps:
    - uses: actions/checkout@v2

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ matrix.toolchain }}
        target: ${{ matrix.target }}
        profile: minimal
        override: true

    - name: Build
      run: cargo build ${{ matrix.options }} --verbose

    - name: Run tests
      run: cargo test ${{ matrix.options }} --verbose
