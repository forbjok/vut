name: CI

on:
  push:
    branches: [ github-actions-test ]
  pull_request:
    branches: [ github-actions-test ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build:
        - stable
        - nightly
        - windows-msvc-x86
        - windows-msvc-x86_64
        - windows-release-x86
        - windows-release-x86_64

        include:
        - build: stable
          os: ubuntu-latest
          toolchain: stable

        - build: nightly
          os: ubuntu-latest
          toolchain: nightly

        - build: windows-msvc-x86
          os: windows-latest
          toolchain: stable
          target: i686-pc-windows-msvc

        - build: windows-msvc-x86_64
          os: windows-latest
          toolchain: stable
          target: x86_64-pc-windows-msvc

        - build: windows-release-x86
          os: windows-latest
          toolchain: stable
          target: i686-pc-windows-msvc
          options: --release
          upload: true

        - build: windows-release-x86_64
          os: windows-latest
          toolchain: stable
          target: x86_64-pc-windows-msvc
          options: --release
          upload: true

    steps:
    - uses: actions/checkout@v2

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ matrix.toolchain }}
        target: ${{ matrix.target }}
        profile: minimal
        override: true

    - name: Build
      run: cargo build ${{ matrix.options }} --verbose

    - name: Run tests
      run: cargo test ${{ matrix.options }} --verbose

    - name: Upload artifacts
      if: matrix.upload == true
      uses: actions/upload-artifact@v1
      with:
        name: ${{ matrix.build }}
        path: target/debug/vut.exe
