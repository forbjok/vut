name: Release

on:
  push:
    branches: [ github-actions-test ]
  pull_request:
    branches: [ github-actions-test ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v2

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: i686-pc-windows-msvc
        profile: minimal
        override: true

    - name: Build
      run: .\build.ps1
      shell: pwsh

    - name: Upload bin-windows-x86
      uses: actions/upload-artifact@v1
      with:
        name: bin-windows-x86
        path: dist/bin-windows-x86.7z

    - name: Upload bin-windows-x86_64
      uses: actions/upload-artifact@v1
      with:
        name: bin-windows-x86_64
        path: dist/bin-windows-x86_64.7z

  release:
    runs-on: ubuntu-latest
    needs: build-windows

    steps:
    - name: Create Release
      id: create_release
      uses: actions/create-release@latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: -- List of changes here --
        draft: true
        prerelease: false

    - uses: actions/download-artifact@v1
      with:
        name: bin-windows-x86
        path: release-artifacts

    - uses: actions/download-artifact@v1
      with:
        name: bin-windows-x86_64
        path: release-artifacts

    - run: ls -al release-artifacts

    - name: Upload bin-windows-x86
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: release-artifacts/bin-windows-x86.7z
        asset_name: bin-windows-x86.7z
        asset_content_type: application/x-7z-compressed

    - name: Upload bin-windows-x86_64
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: release-artifacts/bin-windows-x86_64.7z
        asset_name: bin-windows-x86_64.7z
        asset_content_type: application/x-7z-compressed
